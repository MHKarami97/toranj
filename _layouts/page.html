---
layout: default
---

<div style="max-width:1200px;margin:0 auto;padding:32px 16px 80px;">
  {% if page.title %}
  <header style="margin-bottom:40px;">
    <h1 style="font-size:28px;font-weight:700;letter-spacing:-0.05em;margin-bottom:8px;">{{ page.title }}</h1>
    {% if page.description %}
    <p style="font-size:15px;color:var(--color-muted-gray);">{{ page.description }}</p>
    {% endif %}
  </header>
  {% endif %}

  <div style="background:var(--color-pure-white);border-radius:24px;box-shadow:var(--shadow-sm);padding:32px 40px;font-size:15px;line-height:1.8;">
    {{ content }}
  </div>
</div>
