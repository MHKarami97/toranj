---
layout: default
---

<div class="container--page">
  {% if page.title %}
  <header class="page-header">
    <h1 class="page-title--lg">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-desc--lg">{{ page.description }}</p>
    {% endif %}
  </header>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>
</div>
