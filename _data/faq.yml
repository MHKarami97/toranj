- question: "چگونه می‌توانم محصول را سفارش دهم؟"
  answer: "روی دکمه «ارتباط برای خرید» در صفحه هر محصول کلیک کنید و از طریق واتساپ، تلگرام یا اینستاگرام با ما در ارتباط باشید. سفارش شما به‌صورت مستقیم و بدون واسطه ثبت می‌شود."

- question: "روش‌های ارسال کالا چگونه است؟"
  answer: "ارسال از طریق پست یا تیپاکس به سراسر کشور انجام می‌شود. جزئیات هزینه و زمان ارسال بعد از هماهنگی از طریق واتساپ یا تلگرام اعلام می‌شود."

- question: "آیا امکان بازگشت کالا وجود دارد؟"
  answer: "در صورت وجود مغایرت یا ایراد در کالا، تا ۷ روز پس از دریافت امکان بازگشت وجود دارد. لطفاً از طریق واتساپ با پشتیبانی در ارتباط باشید."

- question: "قیمت‌ها شامل هزینه ارسال است؟"
  answer: "خیر، قیمت‌های نمایش داده شده فقط قیمت محصول است. هزینه ارسال جدا محاسبه و پس از هماهنگی اعلام می‌شود."

- question: "چگونه می‌توانم از موجودی محصول اطمینان حاصل کنم؟"
  answer: "وضعیت موجودی هر محصول (موجود، ناموجود، پیش‌فروش) در صفحه محصول با رنگ‌بندی مشخص نمایش داده می‌شود."
