- question: "چگونه می‌توانم محصول را سفارش دهم؟"
  answer: "روی دکمه «ارتباط برای خرید» در صفحه هر محصول کلیک کنید و از طریق واتساپ، تلگرام یا اینستاگرام با ما در ارتباط باشید. سفارش شما به‌صورت مستقیم و بدون واسطه ثبت می‌شود."

- question: "آیا امکان پرداخت آنلاین از طریق وب‌سایت وجود دارد؟"
  answer: "خیر، این فروشگاه به‌صورت مستقیم و بدون درگاه پرداخت آنلاین کار می‌کند. پس از هماهنگی از طریق واتساپ یا تلگرام، روش پرداخت (کارت به کارت، پرداخت در محل و...) اعلام می‌شود."

- question: "روش‌های ارسال کالا چگونه است؟"
  answer: "ارسال از طریق پست یا تیپاکس به سراسر کشور انجام می‌شود. جزئیات هزینه و زمان ارسال بعد از هماهنگی از طریق واتساپ یا تلگرام اعلام می‌شود."

- question: "هزینه ارسال چقدر است و چه کسی آن را پرداخت می‌کند؟"
  answer: "هزینه ارسال بر اساس شهر مقصد و وزن مرسوله محاسبه می‌شود و معمولاً بر عهده مشتری است، مگر برای سفارش‌های بالای مبلغ مشخص که ارسال رایگان اعمال می‌شود. جزئیات دقیق در زمان نهایی‌شدن سفارش اعلام می‌شود."

- question: "زمان تحویل سفارش چقدر طول می‌کشد؟"
  answer: "برای شهرهای بزرگ معمولاً بین ۲ تا ۴ روز کاری و برای سایر شهرها بین ۳ تا ۷ روز کاری زمان می‌برد. در مواقع پیش‌فروش، زمان تحویل در صفحه محصول ذکر می‌شود."

- question: "آیا امکان بازگشت کالا وجود دارد؟"
  answer: "در صورت وجود مغایرت یا ایراد در کالا، تا ۷ روز پس از دریافت امکان بازگشت وجود دارد. لطفاً از طریق واتساپ با پشتیبانی در ارتباط باشید."

- question: "شرایط تعویض کالا (مثلاً تغییر سایز یا رنگ) چیست؟"
  answer: "در صورتی که کالا استفاده نشده و در بسته‌بندی اصلی باشد، تا ۷ روز پس از دریافت امکان تعویض سایز یا رنگ وجود دارد. هزینه ارسال رفت و برگشت در این حالت بر عهده مشتری است."

- question: "قیمت‌ها شامل هزینه ارسال است؟"
  answer: "خیر، قیمت‌های نمایش داده شده فقط قیمت محصول است. هزینه ارسال جدا محاسبه و پس از هماهنگی اعلام می‌شود."

- question: "آیا قیمت‌های سایت نهایی و قطعی هستند؟"
  answer: "قیمت‌ها ممکن است بدون اطلاع قبلی تغییر کنند. قیمت نهایی همان است که در لحظه هماهنگی خرید از طریق واتساپ یا تلگرام توسط فروشنده تأیید می‌شود."

- question: "چگونه می‌توانم از موجودی محصول اطمینان حاصل کنم؟"
  answer: "وضعیت موجودی هر محصول (موجود، ناموجود، پیش‌فروش) در صفحه محصول با رنگ‌بندی مشخص نمایش داده می‌شود. برای اطمینان بیشتر می‌توانید قبل از خرید از طریق واتساپ استعلام بگیرید."

- question: "محصولات این فروشگاه اورجینال و اصل هستند؟"
  answer: "بله، تمام محصولات با ذکر برند و مشخصات دقیق در صفحه هر محصول عرضه می‌شوند. در صورت وجود گارانتی یا اصالت، جزئیات آن در بخش مشخصات فنی محصول قید شده است."

- question: "آیا محصولات گارانتی دارند؟"
  answer: "بسته به نوع محصول، گارانتی تولیدکننده یا فروشنده ممکن است اعمال شود. جزئیات گارانتی هر کالا در بخش مشخصات فنی همان محصول ذکر می‌شود؛ در صورت نبود اطلاعات، از طریق واتساپ استعلام بگیرید."

- question: "چطور می‌توانم سفارش عمده (به تعداد بالا) ثبت کنم؟"
  answer: "برای سفارش‌های عمده و درخواست قیمت ویژه، مستقیماً از طریق واتساپ یا تلگرام با پشتیبانی فروش تماس بگیرید تا شرایط و تخفیف مربوطه اعلام شود."

- question: "آیا امکان پیگیری وضعیت سفارش وجود دارد؟"
  answer: "بله، پس از ارسال کالا کد رهگیری پستی از طریق همان کانال ارتباطی (واتساپ یا تلگرام) که سفارش را ثبت کرده‌اید برای شما ارسال می‌شود."

- question: "اگر کالای دریافتی معیوب یا مغایر با سفارش باشد چه باید کرد؟"
  answer: "در صورت مشاهده هرگونه ایراد یا مغایرت، حداکثر تا ۷ روز پس از دریافت کالا با ارسال عکس یا ویدئو از طریق واتساپ با پشتیبانی در ارتباط باشید تا فرآیند تعویض یا بازگشت وجه انجام شود."

- question: "پشتیبانی مشتریان چه ساعاتی پاسخگو است؟"
  answer: "تیم پشتیبانی از طریق واتساپ و تلگرام معمولاً در ساعات کاری روزانه پاسخگو است. برای اطلاع از ساعات دقیق فعلی می‌توانید مستقیماً پیام ارسال کنید."

- question: "آیا اطلاعات شخصی من نزد فروشگاه محفوظ است؟"
  answer: "این سایت به‌صورت استاتیک است و هیچ اطلاعات شخصی را از طریق فرم ذخیره نمی‌کند. اطلاعات تماس شما فقط در چت واتساپ یا تلگرام برای هماهنگی سفارش استفاده می‌شود. برای جزئیات بیشتر به صفحه حریم خصوصی مراجعه کنید."

- question: "آیا می‌توانم قبل از خرید محصول را از نزدیک ببینم؟"
  answer: "در حال حاضر فروش صرفاً به‌صورت آنلاین انجام می‌شود و امکان بازدید حضوری وجود ندارد. تمام جزئیات و تصاویر محصول در صفحه مربوطه با کیفیت بالا قرار داده شده است."