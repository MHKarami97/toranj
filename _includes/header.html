<header class="site-header">
  <div style="max-width:1200px;margin:0 auto;padding:0 16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px;">

      <a href="{{ '/' | relative_url }}" style="text-decoration:none;display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <span style="font-size:22px;font-weight:700;color:var(--color-ink-black);letter-spacing:-0.05em;">
          {{ site.title }}
        </span>
      </a>

      <nav style="display:flex;align-items:center;gap:4px;" aria-label="ناوبری اصلی">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">خانه</a>
        <a href="{{ '/products/' | relative_url }}" class="nav-link {% if page.url contains '/products' %}active{% endif %}">محصولات</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url contains '/about' %}active{% endif %}">درباره ما</a>
        <a href="{{ '/contact/' | relative_url }}" class="nav-link {% if page.url contains '/contact' %}active{% endif %}">تماس با ما</a>
        <a href="{{ '/faq/' | relative_url }}" class="nav-link {% if page.url contains '/faq' %}active{% endif %}">سوالات متداول</a>
      </nav>

      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <button
          onclick="document.getElementById('mobile-search').classList.toggle('hidden')"
          aria-label="جستجو"
          style="width:40px;height:40px;border-radius:50%;border:1px solid var(--color-faint-border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>

        <button
          onclick="ThemeToggle.toggle()"
          aria-label="تغییر حالت رنگی"
          style="width:40px;height:40px;border-radius:50%;border:1px solid var(--color-faint-border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>

        <button
          id="mobile-menu-btn"
          aria-label="منو"
          style="width:40px;height:40px;border-radius:50%;border:1px solid var(--color-faint-border);background:white;cursor:pointer;display:none;align-items:center;justify-content:center;"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div id="mobile-search" class="hidden" style="padding-bottom:12px;">
      <form action="{{ '/products/' | relative_url }}" method="get" role="search">
        <div class="search-bar">
          <input
            class="search-bar__input"
            type="search"
            name="q"
            placeholder="جستجوی محصول..."
            aria-label="جستجوی محصول"
            value="{{ page.search_query }}"
          >
          <button class="search-bar__btn" type="submit" aria-label="جستجو">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
      </form>
    </div>
  </div>

  <nav id="mobile-nav" style="display:none;border-top:1px solid var(--color-faint-border);padding:8px 16px 16px;" aria-label="ناوبری موبایل">
    <a href="{{ '/' | relative_url }}" style="display:block;padding:10px 0;color:var(--color-ink-black);text-decoration:none;border-bottom:1px solid var(--color-faint-border);">خانه</a>
    <a href="{{ '/products/' | relative_url }}" style="display:block;padding:10px 0;color:var(--color-ink-black);text-decoration:none;border-bottom:1px solid var(--color-faint-border);">محصولات</a>
    <a href="{{ '/about/' | relative_url }}" style="display:block;padding:10px 0;color:var(--color-ink-black);text-decoration:none;border-bottom:1px solid var(--color-faint-border);">درباره ما</a>
    <a href="{{ '/contact/' | relative_url }}" style="display:block;padding:10px 0;color:var(--color-ink-black);text-decoration:none;border-bottom:1px solid var(--color-faint-border);">تماس با ما</a>
    <a href="{{ '/faq/' | relative_url }}" style="display:block;padding:10px 0;color:var(--color-ink-black);text-decoration:none;">سوالات متداول</a>
  </nav>
</header>

<style>
  .nav-link {
    padding: 6px 12px;
    border-radius: 9999px;
    font-size: 14px;
    color: var(--color-muted-gray);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .nav-link:hover,
  .nav-link.active {
    color: var(--color-ink-black);
    background: var(--color-canvas-mist);
  }
</style>

<script>
  document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
    const nav = document.getElementById('mobile-nav');
    nav.style.display = nav.style.display === 'none' ? 'block' : 'none';
  });
</script>
