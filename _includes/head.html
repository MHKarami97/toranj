<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

{% seo %}

<link rel="stylesheet" href="{{ '/assets/css/compiled.css' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">

{% if page.canonical_url %}
<link rel="canonical" href="{{ page.canonical_url }}">
{% else %}
<link rel="canonical" href="{{ page.url | absolute_url }}">
{% endif %}

<link rel="preload" href="{{ '/assets/fonts/Vazirmatn-Regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

{% if page.schema_type == 'product' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ page.title | escape }}",
  "description": "{{ page.short_description | escape }}",
  "sku": "{{ page.sku }}",
  {% if page.brand %}"brand": { "@type": "Brand", "name": "{{ page.brand | escape }}" },{% endif %}
  "image": [
    {% for img in page.images %}"{{ img | absolute_url }}"{% unless forloop.last %},{% endunless %}{% endfor %}
  ],
  "offers": {
    "@type": "Offer",
    "price": "{{ page.price }}",
    "priceCurrency": "IRR",
    "availability": "{% if page.availability == 'in_stock' %}https://schema.org/InStock{% elsif page.availability == 'preorder' %}https://schema.org/PreOrder{% else %}https://schema.org/OutOfStock{% endif %}",
    "url": "{{ page.url | absolute_url }}"
  }
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "خانه", "item": "{{ '/' | absolute_url }}" },
    { "@type": "ListItem", "position": 2, "name": "{{ page.category }}", "item": "{{ '/categories/' | append: page.category | absolute_url }}" },
    { "@type": "ListItem", "position": 3, "name": "{{ page.title }}", "item": "{{ page.url | absolute_url }}" }
  ]
}
</script>
{% endif %}

{% if page.schema_type == 'faq' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in site.data.faq %}
    {
      "@type": "Question",
      "name": "{{ item.question | escape }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ item.answer | escape }}"
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
